<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" fill="none">
  <style>
    @keyframes float1 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
    @keyframes float2 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes float3 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    @keyframes pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
    @keyframes dash { to { stroke-dashoffset: 0; } }
    @keyframes scaleIn { 0% { transform: scale(0.95); opacity: 0.8; } 50% { transform: scale(1.02); opacity: 1; } 100% { transform: scale(0.95); opacity: 0.8; } }
    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .float1 { animation: float1 4s ease-in-out infinite; }
    .float2 { animation: float2 3.5s ease-in-out infinite 0.5s; }
    .float3 { animation: float3 5s ease-in-out infinite 1s; }
    .pulse { animation: pulse 3s ease-in-out infinite; }
    .scale { animation: scaleIn 6s ease-in-out infinite; }
  </style>

  <!-- Background circles -->
  <circle cx="250" cy="280" r="160" fill="#EEF2FF" class="scale"/>
  <circle cx="250" cy="280" r="120" fill="#E0E7FF" class="scale" style="animation-delay: 0.5s"/>

  <!-- Shield / Security icon -->
  <g class="float1" transform="translate(170, 140)">
    <path d="M80 10L20 40V100C20 145 45 187 80 200C115 187 140 145 140 100V40L80 10Z" fill="#6366F1" fill-opacity="0.15" stroke="#6366F1" stroke-width="3"/>
    <path d="M80 10L20 40V100C20 145 45 187 80 200C115 187 140 145 140 100V40L80 10Z" fill="url(#shieldGrad)" fill-opacity="0.3"/>
    <!-- Check mark -->
    <path d="M55 100L72 117L105 84" stroke="#6366F1" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="80" stroke-dashoffset="80">
      <animate attributeName="stroke-dashoffset" from="80" to="0" dur="1.5s" begin="0.5s" fill="freeze"/>
    </path>
  </g>

  <!-- Card element left -->
  <g class="float2" transform="translate(50, 250)">
    <rect x="0" y="0" width="120" height="75" rx="10" fill="white" stroke="#C7D2FE" stroke-width="2"/>
    <rect x="12" y="12" width="40" height="28" rx="4" fill="#A5B4FC"/>
    <rect x="12" y="50" width="60" height="6" rx="3" fill="#E0E7FF"/>
    <rect x="80" y="50" width="28" height="6" rx="3" fill="#E0E7FF"/>
    <circle cx="100" cy="25" r="8" fill="#6366F1" fill-opacity="0.2"/>
    <circle cx="108" cy="25" r="8" fill="#8B5CF6" fill-opacity="0.2"/>
  </g>

  <!-- User avatar -->
  <g class="float3" transform="translate(310, 220)">
    <circle cx="55" cy="55" r="55" fill="white" stroke="#C7D2FE" stroke-width="2"/>
    <circle cx="55" cy="40" r="18" fill="#A5B4FC"/>
    <path d="M20 85C20 67 35 58 55 58C75 58 90 67 90 85" fill="#6366F1" fill-opacity="0.2"/>
    <!-- Online indicator -->
    <circle cx="82" cy="78" r="10" fill="white"/>
    <circle cx="82" cy="78" r="7" fill="#22C55E" class="pulse"/>
  </g>

  <!-- Chart bars -->
  <g class="float2" transform="translate(100, 370)">
    <rect x="0" y="30" width="20" height="50" rx="4" fill="#A5B4FC">
      <animate attributeName="height" values="30;50;30" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="y" values="50;30;50" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="28" y="15" width="20" height="65" rx="4" fill="#818CF8">
      <animate attributeName="height" values="45;65;45" dur="3s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="y" values="35;15;35" dur="3s" begin="0.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="56" y="5" width="20" height="75" rx="4" fill="#6366F1">
      <animate attributeName="height" values="55;75;55" dur="3s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="y" values="25;5;25" dur="3s" begin="0.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="84" y="20" width="20" height="60" rx="4" fill="#4F46E5">
      <animate attributeName="height" values="40;60;40" dur="3s" begin="0.9s" repeatCount="indefinite"/>
      <animate attributeName="y" values="40;20;40" dur="3s" begin="0.9s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Coins / money -->
  <g class="float1" transform="translate(300, 370)">
    <ellipse cx="50" cy="65" rx="45" ry="12" fill="#FDE68A" fill-opacity="0.5"/>
    <ellipse cx="50" cy="55" rx="45" ry="12" fill="#FCD34D" stroke="#F59E0B" stroke-width="1.5"/>
    <ellipse cx="50" cy="45" rx="45" ry="12" fill="#FBBF24" stroke="#F59E0B" stroke-width="1.5"/>
    <ellipse cx="50" cy="35" rx="45" ry="12" fill="#FCD34D" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="50" y="40" text-anchor="middle" font-family="system-ui" font-weight="bold" font-size="14" fill="#92400E">UZS</text>
  </g>

  <!-- Decorative dots -->
  <circle cx="80" cy="180" r="4" fill="#A5B4FC" class="pulse"/>
  <circle cx="420" cy="170" r="3" fill="#C4B5FD" class="pulse" style="animation-delay: 1s"/>
  <circle cx="440" cy="350" r="5" fill="#A5B4FC" class="pulse" style="animation-delay: 0.5s"/>
  <circle cx="60" cy="350" r="3" fill="#C4B5FD" class="pulse" style="animation-delay: 1.5s"/>
  <circle cx="250" cy="460" r="4" fill="#A5B4FC" class="pulse" style="animation-delay: 2s"/>

  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>
</svg>
